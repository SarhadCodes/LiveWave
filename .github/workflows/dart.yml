name: iOS-ipa-build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag for IPA upload'
        required: false
        default: 'v1.0.1'

jobs:
  build-ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (lib only)
        run: flutter analyze lib

      - name: Precache iOS artifacts
        run: flutter precache --ios

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods --no-document || true
          pod --version

      - name: Pod install
        working-directory: ios
        run: pod install --repo-update

      - name: Build iOS release (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r -9 FlutterIpaExport.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: build/ios/iphoneos/FlutterIpaExport.ipa
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: ${{ github.event.inputs.release_tag }}
          overwrite: true
          body: Live Wave iOS release build (unsigned IPA)
