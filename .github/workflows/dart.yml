name: iOS-ipa-build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag for IPA upload'
        required: false
        default: 'v1.0.1'

jobs:
  build-ios:
    name: 📱 Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📋 Flutter Version
        run: flutter --version

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🍎 Precache iOS
        run: flutter precache --ios

      - name: 💎 Install CocoaPods
        run: |
          sudo gem install cocoapods --no-document || true
          pod repo update
          pod install --repo-update
        working-directory: ios

      - name: 🏗 Build iOS (No Code Signing)
        run: flutter build ios --release --no-codesign

      - name: 📦 Create IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r FlutterIpaExport.ipa Payload

      - name: ⬆ Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiveWave-iOS-IPA
          path: build/ios/iphoneos/FlutterIpaExport.ipa

      - name: 🚀 Upload to GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: ${{ github.event.inputs.release_tag }}
          overwrite: true
          body: |
            Live Wave iOS Release
            Unsigned IPA built with GitHub Actions.
